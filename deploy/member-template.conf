# Required settings for the template assigned to API-managed zones
# (KNOT_API_ZONE_TEMPLATE, default "member"). Merge into your knot.conf /
# confdb. Verified against Knot DNS 3.5.
#
# Import into a running confdb setup with:
#   knotc conf-begin && knotc conf-set 'template[member].<item>' '<value>' ... && knotc conf-commit

template:
  - id: member
    # storage + file must match KNOT_API_ZONES_DIR exactly; the API writes
    # <zones_dir>/<zone>.zone (lowercase, no trailing dot), which is what
    # "%s.zone" expands to.
    storage: /var/lib/knot/zones
    file: "%s.zone"

    # Catalog membership — the generated catalog zone is updated automatically
    # when the API adds/removes zones; secondaries purge de-cataloged members
    # themselves.
    catalog-role: member
    catalog-zone: catalog.example.  # <- your catalog zone

    # SOA serial is managed by Knot, not by the zonefile:
    # the file's serial is ignored, Knot computes an IXFR-friendly diff on
    # every reload and bumps the serial per serial-policy.
    zonefile-load: difference-no-serial
    serial-policy: unixtime          # or dateserial / increment

    # LOAD-BEARING: Knot must never flush zones back to disk, otherwise its
    # flushes race the API's file writes and can silently clobber an update.
    # (This also means the on-disk serial is intentionally stale — the live
    # serial comes from zone-status / the API response.)
    zonefile-sync: -1

    # Hard requirement of difference-no-serial (knotd rejects the config
    # otherwise): the journal must hold full zone contents so knotd can diff
    # without trusting the zonefile serial.
    journal-content: all

    # acl: ...  # your transfer/notify ACLs for the secondaries
