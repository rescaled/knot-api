# knotd configuration for the docker compose e2e harness.
# Imported ONCE into an LMDB confdb by knot-entrypoint.sh — mirroring a
# production confdb setup; afterwards all changes happen via the control
# socket (that is what the API exercises).

server:
    rundir: /rundir
    listen: 0.0.0.0@53

control:
    listen: /rundir/knot.sock

log:
  - target: stdout
    any: info

database:
    storage: /storage

template:
  - id: member
    storage: /zones
    file: "%s.zone"
    catalog-role: member
    catalog-zone: catalog.
    zonefile-load: difference-no-serial
    zonefile-sync: -1
    journal-content: all
    serial-policy: unixtime

zone:
  - domain: catalog.
    catalog-role: generate
